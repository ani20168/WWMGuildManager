name: Build & Release

# 觸發條件：推送 v*.*.* 格式的 tag（例如 v1.0.0）
# 也可從 GitHub 頁面手動觸發
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag（例如 v1.2.3）"
        required: true
        default: "v0.0.0-test"

permissions:
  contents: write   # 允許建立 Release 與上傳附件

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. 取得原始碼 ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 設定 Python（含 pip 快取加速重複建置）────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. 安裝依賴套件 ──────────────────────────────────────────────────
      #    先明確安裝 CUDA 版 PyTorch（runner 無 GPU 也能安裝，DLL 會被打包進 exe）
      #    若不先裝，easyocr 預設會從 PyPI 拉 CPU-only 版，導致發布版無法 GPU 加速
      #    pip cache 可大幅縮短第二次以後的建置時間
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.9.0 torchvision==0.24.0 --index-url https://download.pytorch.org/whl/cu130
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4. PyInstaller 打包 ──────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller WWMGuildManager.spec

      # ── 5. DLL 依賴完整性檢查（模擬無 CUDA 環境，提前發現依賴問題）──────
      - name: Check DLL dependencies
        run: python check_dll_deps.py --dist dist\WWMGuildManager

      # ── 6. 確認輸出目錄 ──────────────────────────────────────────────────
      - name: List dist folder
        run: Get-ChildItem -Path dist\WWMGuildManager | Select-Object Name, Length

      # ── 7. 複製 images/ 到 dist 根目錄（讓使用者可自行替換模板圖片）────────
      - name: Copy images to dist
        run: Copy-Item -Path "images" -Destination "dist\WWMGuildManager\images" -Recurse

      # ── 7b. 建立空的 logs/ 資料夾（程式啟動後也會自動建立，這裡預先放入方便辨識）──
      - name: Create logs folder in dist
        run: New-Item -ItemType Directory -Force -Path "dist\WWMGuildManager\logs"

      # ── 8. 壓縮成 zip ────────────────────────────────────────────────────
      - name: Zip release artifact
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ github.event.inputs.tag_name }}"
          } else {
            "${{ github.ref_name }}"
          }
          Compress-Archive `
            -Path "dist\WWMGuildManager" `
            -DestinationPath "WWMGuildManager-${tag}-windows.zip"
          Write-Output "ZIP_NAME=WWMGuildManager-${tag}-windows.zip" >> $env:GITHUB_ENV

      # ── 9. 上傳至 GitHub Releases ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag_name }}
          name: Release ${{ github.ref_name || github.event.inputs.tag_name }}
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.event.inputs.tag_name, '-') }}
          body: |
            ## 使用說明
            1. 下載並解壓縮 `${{ env.ZIP_NAME }}`
            2. 進入 `WWMGuildManager` 資料夾，執行 `WWMGuildManager.exe`

            ## 系統需求
            - Windows 10 / 11（64 位元）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
